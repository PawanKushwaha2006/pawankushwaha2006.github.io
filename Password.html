<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate File Locker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        .box { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
        textarea, input { 
            width: 100%; background: #0f172a; border: 2px solid #334155; 
            border-radius: 12px; color: white; padding: 12px; outline: none; font-size: 16px;
        }
        textarea { height: 120px; }
        button { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px;
            background: #10b981; color: white;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🔐 File Locker Pro</h2>
    
    <div class="box">
        <label>Apna Secret Message:</label>
        <textarea id="myText" placeholder="Yaha apna message likho..."></textarea>
    </div>
    
    <div class="box">
        <label>File Open Password Set Karo:</label>
        <input type="text" id="myPass" placeholder="Ex: 1234">
    </div>

    <button onclick="createLockedFile()">⬇️ Download Locked File</button>
</div>

<script>
    function createLockedFile() {
        const text = document.getElementById("myText").value;
        const pass = document.getElementById("myPass").value;

        if(!text.trim() || !pass.trim()) {
            alert("Pehle Message aur Password dono set karein!");
            return;
        }

        // Yeh code ek nayi HTML file banayega jo password maangegi
        const lockedFileContent = `
<!DOCTYPE html>
<html>
<head>
    <title>Locked File</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .lock-box { text-align: center; background: #222; padding: 30px; border-radius: 15px; border: 2px solid #444; width: 90%; max-width: 350px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: none; font-size: 16px; }
        button { background: #10b981; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #content { display: none; padding: 20px; white-space: pre-wrap; font-size: 18px; color: #38bdf8; }
    </style>
</head>
<body>
    <div id="login" class="lock-box">
        <h3>🔒 Yeh file Locked hai</h3>
        <input type="password" id="p" placeholder="Password Dalein">
        <button onclick="check()">Open File</button>
    </div>
    <div id="content"></div>

    <script>
        function check() {
            var input = document.getElementById('p').value;
            var secret = "${btoa(text)}"; // Message is encoded
            if(input === "${pass}") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('content').innerText = atob(secret);
            } else {
                alert("❌ Galat Password!");
            }
        }
    <\/script>
</body>
</html>`;

        const blob = new Blob([lockedFileContent], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "Secret_File.html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
