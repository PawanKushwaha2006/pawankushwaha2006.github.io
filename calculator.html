<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator {
    background: #111;
    padding: 20px;
    border-radius: 20px;
    width: 320px;
}

/* Display */
#display {
    width: 100%;
    height: 60px;
    font-size: 28px;
    margin-bottom: 15px;
    text-align: right;
    border: none;
    border-radius: 10px;
    padding: 10px;
    background: #222;
    color: #0f0;
}

/* Grid */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

/* Buttons */
button {
    height: 55px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #2c2c2c;
    color: white;
    transition: 0.2s;
}

button:active {
    transform: scale(0.9);
}

/* Special */
.operator {
    background: orange;
}

.equal {
    background: green;
}

.clear {
    background: red;
}
</style>

</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<!-- Numbers TOP -->
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/') " class="operator">÷</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')" class="operator">×</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')" class="operator">−</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="add('+')" class="operator">+</button>
<button onclick="calculate()" class="equal">=</button>


<!-- Bottom FULL WIDTH FIX -->
<button onclick="del()" style="grid-column: span 2;">⌫</button>
<button onclick="clearDisplay()" class="clear" style="grid-column: span 2;">C</button>
</div>

</div>

<script>
let display = document.getElementById("display");

function add(val) {
    let last = display.value.slice(-1);

    if (display.value === "" && "+*/".includes(val)) return;

    if ("+-*/".includes(val) && "+-*/".includes(last)) {
        display.value = display.value.slice(0, -1) + val;
        return;
    }

    display.value += val;
}

function clearDisplay() {
    display.value = "";
}

function del() {
    display.value = display.value.slice(0, -1);
}

function calculate() {
    try {
        display.value = Function("return " + display.value)();
    } catch {
        display.value = "Error";
    }
}
</script>

</body>
</html>
